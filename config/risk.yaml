base_risk_pct: 0.02
min_risk_pct: 0.005
max_risk_pct: 0.03
max_position_size_pct: 0.30
max_concurrent: 3
daily_loss_limit: 0.05
weekly_loss_limit: 0.10
max_drawdown: 0.15
